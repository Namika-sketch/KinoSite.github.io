<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Актеры</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/actors.css">
    <link rel="stylesheet" href="css/media.css">
</head>
<body>
    <div class="header-placeholder"></div>
    <main class="main">
        <section class="actors">
            <div class="container">
                <h1 class="actors_title title">Актеры</h1>
                <div class="actors_wrapper wrapper-cards">
                </div>
                <div class="movies_pagination">
                    <div class="movies_pagination-item item--prev"><</div>
                    <div class="movies_pagination-item number-1 item--active">1</div>
                    <div class="movies_pagination-item number-2">2</div>
                    <div class="movies_pagination-item number-3">3</div>
                    <div class="movies_pagination-item number-3">4</div>
                    <div class="movies_pagination-item number-3">5</div>
                    <div class="movies_pagination-item number-3">6</div>                        <div class="movies_pagination-item item--next">></div>
                </div>
            </div>
        </section>
        <section class="recent">
            <div class="container">
                <h2 class="recent_title title">Последние просмотренные</h2>
                <div class="actors_wrapper wrapper-cards">
                    <div class="recent_card actor-card">
                        <img class="actor_card-img" src="#" alt="actor card">
                        <h3 class="actor_card-name">#</h3>
                    </div>
                    <div class="recent_card actor-card">
                        <img class="actor_card-img" src="#" alt="actor card">
                        <h3 class="actor_card-name">#</h3>
                    </div>
                    <div class="recent_card actor-card">
                        <img class="actor_card-img" src="#" alt="actor card">
                        <h3 class="actor_card-name">#</h3>
                    </div>
                    <div class="recent_card actor-card">
                        <img class="actor_card-img" src="#" alt="actor card">
                        <h3 class="actor_card-name">#</h3>
                    </div>
                </div>
            </div>
        </section>
        <section class="modal">
            <button class="modal_close"></button>
            <div class="modal_wrapper">
                <img src="#" alt="close" class="modal_img">
                <div class="modal_info">
                    <h2 class="modal_fio"><br></h2>
                    <p class="modal_age"></p>
                    <h3 class="modal_films modal_title"></h3>
                    <ul class="modal_films-list">
                        <li class="modal_films-item"></li>
                        <li class="modal_films-item"></li>
                    </ul>
                </div>
            </div>
            <h3 class="modal_bio-title modal_title"></h3>
            <p class="modal_bio-text"></p>
            <button class="modal_btn"></button>
        </section>
        <div class="subscribe-placeholder"></div>
    </main>
    <div class="footer-placeholder"></div>
    <script src="js/get-blocks.js"></script>
    <script src="js/actors.js"></script>
</body>
</html>
