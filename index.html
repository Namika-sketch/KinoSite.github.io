<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сайт для просмотра информации о кино">
    <meta name="keywords" content="кино смотреть киносайт премьера плеер новинки фильмы сериалы">
    <meta property="og:title" content="КиноСайт : Сайт для просмотра информации о кино">
    <title>Киносайт</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/media.css">
</head>
<body itemscope itemtype="https://schema.org/WebPage">
    <div class="header-placeholder">

    </div>
    <main class="main">
        <section class="hero">
            <div class="container">
                <h1 class="hero_title">КиноСайт</h1>
                <p class="hero_text">Окунись в мир кино</p>
                <a class="hero_cta" href="#subscribe">Подписаться</a>
            </div>
        </section>
        <section class="movies" id="movies">
            <div class="container">
                <h2 class="movies_title title">Наши фильмы</h2>
                <div class="movies_cards">
                </div>
                <div class="movies_pagination">
                    <div class="movies_pagination-item item--prev"><</div>
                    <div class="movies_pagination-item number-1 item--active">1</div>
                    <div class="movies_pagination-item number-2">2</div>
                    <div class="movies_pagination-item number-3">3</div>
                    <div class="movies_pagination-item item--next">></div>
                </div>
            </div>
        </section>
        <div class="subscribe-placeholder"></div>
    </main>
    <div class="footer-placeholder"></div>
    <script src="js/get-blocks.js"></script>
    <script src="js/scipt.js"></script>
</body>
</html>
